name: Multibranch pipeline
run-name: 'Multibranch ${{ github.head_ref || github.ref_name }}'
on:
  push:
    branches:
      - main
      - release/*
      - feature/*
      - bugfix/*
  workflow_dispatch:
    inputs:
      skipSmokeTests:
        description: Should skip smoke tests?
        type: boolean
        required: false
        default: false
jobs:
  properties:
    uses: ./.github/workflows/datacenterMap.yml
    with:
      hubEnv: '${{ inputs.hubEnv }}'
    secrets: inherit

  buildTestDeploy:
    runs-on: ubuntu-latest
    needs: properties
    env:
      AWS_ACCOUNT: '${{ needs.properties.outputs.AWS_ACCOUNT }}'
      AWS_PROFILE: '${{ needs.properties.outputs.PROFILE }}'
      AWS_KEY: '${{ secrets[format(''{0}_AWS_KEY'', inputs.hubEnv)] }}'
      AWS_SECRET: '${{ secrets[format(''{0}_AWS_SECRET'', inputs.hubEnv)] }}'
      AWS_REGION: '${{ needs.properties.outputs.REGION }}'
    #    TODO Checkout, JDK 17 setup, Maven setup, Build with JaCoCo, Configure AWS credentials, Login to Amazon ECR, Push image to Amazon ECR, Deploy Amazon ECS task definition, Run smoke tests if not skipped


    steps:
        - name: Checkout
          uses: actions/checkout@v3
          with:
            fetch-depth: 0
        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            distribution: 'corretto'
            java-version: '17'

        - name: "Set up docker"
          uses: "docker/setup-buildx-action@v2"
          with:
            version: "0.8.2"

        - name: "build with maven"
          run: mvn clean install

        - name: "test with maven"
          run: mvn clean test

        - name: "Configure AWS credentials"
          run: >
            mkdir -p ~/.aws

            echo "[${{ env.AWS_PROFILE }}]" > ~/.aws/credentials

            echo "aws_access_key_id = ${{ env.AWS_KEY }}" >> ~/.aws/credentials

            echo "aws_secret_access_key = ${{ env.AWS_SECRET }}" >>
            ~/.aws/credentials
        - name: "Login to Amazon ECR"
          run: aws ecr get-login-password --region ${{ env.AWS_REGION }} |
                docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

        - name: "Push image to Amazon ECR"
          run: docker build -t backend:latest .
                docker tag backend:latest ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:latest
                docker push ${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/backend:latest


  pipelinePassed:
    runs-on: ubuntu-latest
    needs: buildTestDeploy
    steps:
      - name: All passed
        run: |
          echo "All steps have passed."
